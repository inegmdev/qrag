version: '3'

tasks:
  default:
    desc: List available tasks
    cmd: task --list

  install:
    desc: Install qrag in editable mode
    cmd: pip install -e .

  test:
    desc: Run the test suite
    cmd: pytest tests/

  run-ai:
    desc: Run claude-exec.py — loops until all issues are implemented
    cmd: python docs/claude-exec.py
