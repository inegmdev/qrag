[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "quickrag-ti"
version = "0.1.0"
description = "Semantic + structural code/doc indexing for TI SDK LLM agents"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1.6",
]

[project.scripts]
quickrag-ti = "quickrag_ti.cli:cli"

[tool.setuptools.packages.find]
where = ["src"]
