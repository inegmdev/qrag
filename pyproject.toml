[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "qrag"
version = "0.1.0"
description = "Build semantic RAG databases from your code and docs — once per team, instant for every AI agent"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1.6",
    "tree-sitter>=0.22,<0.26",
    "tree-sitter-c>=0.21",
    "tree-sitter-cpp>=0.23",
    "pymupdf>=1.24",
    "html2text>=2024.2",
    "beautifulsoup4>=4.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
]

[project.scripts]
qrag = "qrag.cli:cli"
qrag-mcp-server = "qrag.mcp_server:run"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests that require real sentence-transformers embeddings (slow)",
]
